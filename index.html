<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eMap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
	<script src="https://unpkg.com/leaflet-rotate@0.3.0/dist/leaflet-rotate.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 1; background: #f0f0f0; cursor: crosshair; }
        .leaflet-routing-container { display: none !important; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .user-location-marker {
            background: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            transition: all 0.5s linear;
        }
        .pulse-ring {
            border: 3px solid #3b82f6;
            border-radius: 50%;
            height: 40px;
            width: 40px;
            position: absolute;
            left: -12px;
            top: -12px;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .loading-spinner {
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Transitions for Guidance Mode */
        .hud-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .guidance-layout {
            max-width: 600px !important;
            border-radius: 24px !important;
            margin-left: 0 !important;
            margin-right: auto !important;
            transform: scale(0.95);
            border: 2px solid #3b82f6;
        }

        .custom-marker {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .instruction-highlight {
            font-size: 1.5rem;
            line-height: 1.2;
            color: #111827;
            font-weight: 800;
        }
        #hud-panel {
           max-width: 600px;
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden font-sans">

    <!-- Location Prompt -->
    <div id="location-prompt" class="fixed inset-0 z-[3000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 text-center transition-opacity duration-500">
        <div class="bg-white rounded-3xl p-8 max-w-sm shadow-2xl">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome to eMap</h2>
            <p class="text-gray-600 mb-6">Experience 0.5s real-time updates and focused turn-by-turn guidance online.</p>
            <button onclick="requestLocationAccess()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                Allow Location
            </button>
        </div>
    </div>
    <!-- Floating Buttons -->
    <div class="absolute bottom-8 right-4 z-[10000] flex flex-col gap-3 transition-transform duration-500" id="map-controls">
        <button id="recenter-btn" class="p-4 bg-white rounded-full shadow-lg text-blue-600 hover:bg-gray-50 transition border border-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        </button>
    </div>
	<div id="home-panel" class="absolute bottom-4 left-4 right-4 z-[1000] flex flex-col items-center gap-3 hud-transition">

    <div class="w-full max-w-md glass-panel rounded-3xl shadow-2xl p-5">

        <h2 class="text-xl font-black text-gray-900 mb-4">Home</h2>

        <!-- Search -->
        <div id="search-container"class="flex items-center gap-2 mb-4">
            <input id="search-input" type="text" placeholder="Search destination..." class="flex-1 px-4 py-3 rounded-2xl bg-gray-100 outline-none">

            <button id="search-btn" class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
    <span id="search-text">Search</span>
    <svg id="search-spinner" class="w-5 h-5 animate-spin text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
    </svg>
</button>
        </div>

        <!-- Favorites -->
        <div>
            <h3 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">
                Favorites
            </h3>

            <div id="saved-locations-container" class="flex flex-col gap-2 max-h-56 overflow-y-auto">
            </div>
        </div>

    </div>
</div>
    <!-- Dynamic Navigation HUD -->
    <div id="nav-hud" class="hidden absolute bottom-4 left-4 right-4 z-[1000] flex flex-col items-center pointer-events-none hud-transition">
        <div id="hud-panel" class="w-full glass-panel rounded-3xl shadow-2xl p-5 pointer-events-auto hud-transition">

            <!-- Summary Mode (Before Start) -->
            <div id="mode-summary" class="block">
                <div class="mb-4 bg-gray-50/80 p-3 rounded-2xl border border-gray-100">
                    <h3 id="dest-name" class="font-black text-gray-900 text-xl leading-tight truncate">Destination Road</h3>
                    <p id="dest-address" class="text-xs text-gray-500 font-semibold uppercase tracking-wider truncate">Locality, City</p>
                </div>
            </div>

            <!-- Guidance Content -->
            <div class="flex flex-col gap-4">
                <div class="flex items-start gap-4">
                    <div id="instruction-icon-container" class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200 shrink-0">
                        <svg id="maneuver-svg" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p id="next-instruction" class="instruction-highlight">Proceed to route</p>
                        <p id="distance-info" class="text-lg text-blue-600 font-black mt-1">---</p>
                    </div>
                    <button id="close-nav-btn" onclick="stopNavigation()" class="p-1 text-gray-300 hover:text-red-500 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    </button>
                </div>
                
                <!-- Compact Stats Grid -->
                <div class="flex gap-4 border-t border-gray-100 pt-3">
                    <div class="flex-1">
                        <span class="block text-[10px] uppercase text-gray-400 font-bold tracking-widest">Arrival</span>
                        <span id="eta-time" class="text-sm font-black text-gray-800">--:--</span>
                    </div>
                    <div class="flex-1 border-l border-gray-100 pl-4">
                        <span class="block text-[10px] uppercase text-gray-400 font-bold tracking-widest">Time</span>
                        <span id="duration-info" class="text-sm font-black text-gray-800">0m</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons (Hidden in Guidance Mode) -->
            <div id="action-buttons" class="flex gap-3 mt-5">
                <button id="start-guidance-btn" class="flex-[2] bg-blue-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-blue-700 transition shadow-xl shadow-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    START
                </button>
                <button id="save-location-btn" class="flex-1 bg-white border-2 border-gray-100 text-gray-700 font-bold py-4 rounded-2xl flex items-center justify-center hover:bg-gray-50 transition">
                    SAVE
                </button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="notification" class="fixed top-24 left-1/2 -translate-x-1/2 z-[2000] px-6 py-3 rounded-full bg-gray-900 text-white text-xs font-bold shadow-2xl transition-all duration-300 transform -translate-y-20 opacity-0 pointer-events-none text-center"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
const enterRoundaboutSVG = `
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 20 V12"/> <!-- vertical line up -->
  <path d="M12 12 A6 6 0 0 1 6 6"/> <!-- half circle left -->
  <path d="M6 6 V2"/> <!-- vertical continuation with arrow head -->
  <polyline points="5,3 6,2 7,3"/> <!-- arrow head -->
</svg>`;
const exitRoundaboutSVG = `
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- quarter circle starting from left-middle -->
  <path d="M8 16 A8 8 0 0 1 16 8"/>
  <!-- vertical arrow going up -->
  <path d="M16 8 V4"/>
  <!-- arrowhead -->
  <polyline points="15,5 16,4 17,5"/>
</svg>`;
        let map, userMarker, routingControl, destMarker;
        let userCoords = null;
        let isNavigating = false;
        let isGuidanceActive = false;
        let followMode = false;
        let watchId = null;
        let currentRoute = null;
        let lastUpdateTime = 0;

        function initMap() {
    		map = L.map('map', {
    			zoomControl: false,
    			attributionControl: false,
    			rotate: true,
    			touchRotate: true,
    			rotateControl: false,
    			bearing: 0
			}).setView([20, 0], 2);
    		L.tileLayer(
        		'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        		{ maxZoom: 20 }
    		).addTo(map);
			map.setBearing(0);
    		map.on('click', (e) => {
        		if (!isGuidanceActive) startNavigation([e.latlng.lat, e.latlng.lng]);
    		});

    		if (navigator.permissions) {
        		navigator.permissions.query({ name: 'geolocation' }).then(result => {
            		if (result.state === 'granted') requestLocationAccess();
            		else document.getElementById('location-prompt').classList.remove('hidden');
        		});
    		} else {
        		document.getElementById('location-prompt').classList.remove('hidden');
    		}
		}

        function requestLocationAccess() {
            document.getElementById('location-prompt').classList.add('opacity-0');
            setTimeout(() => document.getElementById('location-prompt').classList.add('hidden'), 500);
            watchId = navigator.geolocation.watchPosition(updateUserLocation, handleLocationError, {
                enableHighAccuracy: true, maximumAge: 0, timeout: 5000
            });
            followMode=false;
        }

function updateUserLocation(position) {
    const { latitude, longitude } = position.coords;
    userCoords = [latitude, longitude];

    if (!userMarker) {
        const userIcon = L.divIcon({
            className: 'user-location-wrapper',
            html: '<div class="pulse-ring"></div><div class="user-location-marker w-4 h-4"></div>',
            iconSize: [16, 16]
        });
        userMarker = L.marker(userCoords, { icon: userIcon }).addTo(map);
    } else {
        userMarker.setLatLng(userCoords);
    }

    if (followMode) {
        map.setView(userCoords, 18, {
            animate: true,
            duration: 0.5
        });

        if (isGuidanceActive && currentRoute) {
            const dest = currentRoute.coordinates[currentRoute.coordinates.length - 1];

            const bearing = getBearing(userCoords, dest);

            map.setBearing(bearing);

        }
    }

    if (isGuidanceActive && currentRoute) {
        updateGuidanceUI();
    }
}
        async function getRoadDetails(lat, lng) {
            try {
                const response = await fetch(`https://photon.komoot.io/reverse?lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data.features?.length) {
                    const p = data.features[0].properties;
                    return { 
                        name: p.name || p.street || "Unknown Road", 
                        address: [p.district, p.city].filter(Boolean).join(", ") 
                    };
                }
            } catch (e) {}
            return { name: "Target Point", address: "Route Established" };
        }

        async function snapToRoad(lat, lng) {
            try {
                const response = await fetch(`https://router.project-osrm.org/nearest/v1/driving/${lng},${lat}?number=1`);
                const data = await response.json();
                if (data.code === 'Ok' && data.waypoints.length) {
                    const [sLng, sLat] = data.waypoints[0].location;
                    return [sLat, sLng];
                }
            } catch (e) {}
            return [lat, lng];
        }

        async function startNavigation(rawDest) {
            if (!userCoords) return showNotification("Locating...");
            setLoading(true);
            exitGuidanceLayout(); // Ensure standard layout for preview

            const [roadStart, roadDest, details] = await Promise.all([
                snapToRoad(userCoords[0], userCoords[1]),
                snapToRoad(rawDest[0], rawDest[1]),
                getRoadDetails(rawDest[0], rawDest[1])
            ]);

            document.getElementById('dest-name').innerText = details.name;
            document.getElementById('dest-address').innerText = details.address;

            if (routingControl) map.removeControl(routingControl);
            if (destMarker) map.removeLayer(destMarker);

            isNavigating = true;
            followMode = true;

            destMarker = L.marker(roadDest, { 
                icon: L.icon({ iconUrl: 'https://cdn0.iconfinder.com/data/icons/small-n-flat/24/678111-map-marker-512.png', iconSize: [44, 44], iconAnchor: [22, 44] })
            }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(roadStart[0], roadStart[1]), L.latLng(roadDest[0], roadDest[1])],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'driving' }),
                lineOptions: { styles: [{ color: '#1e3a8a', opacity: 0.1, weight: 12 }, { color: '#3b82f6', opacity: 0.9, weight: 6 }] },
                createMarker: () => null,
                show: false
            }).on('routesfound', (e) => {
                setLoading(false);
                currentRoute = e.routes[0];
                document.getElementById('home-panel').classList.add('hidden');
document.getElementById('nav-hud').classList.remove('hidden');
                
                const s = currentRoute.summary;
                document.getElementById('next-instruction').innerText = currentRoute.instructions[0]?.text || "Proceed to route";
                document.getElementById('distance-info').innerText = `${(s.totalDistance / 1000).toFixed(1)} km`;
                document.getElementById('duration-info').innerText = `${Math.round(s.totalTime / 60)}m`;
                
                const eta = new Date();
                eta.setSeconds(eta.getSeconds() + s.totalTime);
                document.getElementById('eta-time').innerText = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                
                document.getElementById('start-guidance-btn').onclick = enterGuidanceLayout;

                map.flyTo(roadStart, 17);
            }).addTo(map);
        }

        function enterGuidanceLayout() {
    followMode = true;
    isGuidanceActive = true;
    currentInstrIdx = 0; // start at first step
    showInstruction(currentInstrIdx); // show first instruction
    const hud = document.getElementById('nav-hud');
    const panel = document.getElementById('hud-panel');
    const search = document.getElementById('search-container');
    const mapCtrl = document.getElementById('map-controls');
    
    hud.classList.add('guidance-layout');
    panel.classList.add('bg-blue-50');
    search.classList.add('opacity-0', '-translate-y-20');
    mapCtrl.classList.add('translate-x-20');
    
    document.getElementById('mode-summary').classList.add('hidden');
    document.getElementById('action-buttons').classList.add('hidden');
    document.getElementById('close-nav-btn').classList.remove('hidden');
    
    map.setZoom(18);
    showNotification("Guidance Started");
}

        function exitGuidanceLayout() {
            followMode = false;
            isGuidanceActive = false;
            const hud = document.getElementById('nav-hud');
            const panel = document.getElementById('hud-panel');
            const search = document.getElementById('search-container');
            const mapCtrl = document.getElementById('map-controls');
            
            hud.classList.remove('guidance-layout');
            panel.classList.remove('bg-blue-50', 'guidance-active');
            search.classList.remove('opacity-0', '-translate-y-20');
            mapCtrl.classList.remove('translate-x-20');
            
            document.getElementById('mode-summary').classList.remove('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');
        }

        function updateGuidanceUI() {
    if (!currentRoute || !userCoords) return;

    // Find the closest instruction based on user position
    let closestIdx = 0;
    let minDistance = Infinity;

    currentRoute.instructions.forEach((instr, idx) => {
        const point = currentRoute.coordinates[instr.index];
        const d = L.latLng(userCoords).distanceTo(L.latLng(point.lat, point.lng));
        if (d < minDistance) {
            minDistance = d;
            closestIdx = idx;
        }
    });

    const instr = currentRoute.instructions[closestIdx];
    let nextText = instr.text || "Proceed to route";

    nextText = nextText.replace(/^Head/i, "Go");

    document.getElementById('next-instruction').innerText = nextText;

    const svg = document.getElementById('maneuver-svg');
    const lower = nextText.toLowerCase();
    if (lower.includes('left')) svg.innerHTML = '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>';
    else if (lower.includes('right')) svg.innerHTML = '<path d="m12 5 7 7-7 7"/><path d="M5 12h14"/>';

	 else if (lower.includes('circle')) {
        if (lower.includes('enter')) svg.innerHTML = enterRoundaboutSVG;
        else svg.innerHTML = exitRoundaboutSVG;
    }
    else svg.innerHTML = '<path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>';

    document.getElementById('distance-info').innerText =
        minDistance < 40 ? `NOW` : `${Math.round(minDistance)}m`;

    const dest = currentRoute.coordinates[currentRoute.coordinates.length - 1];
    const distTotal = L.latLng(userCoords).distanceTo(L.latLng(dest.lat, dest.lng));

    document.getElementById('duration-info').innerText = `${Math.ceil(distTotal / 150)}m`;

    if (nextText !== lastSpokenInstruction) {
        lastSpokenInstruction = nextText;
        if ('speechSynthesis' in window) {
            const utter = new SpeechSynthesisUtterance(nextText);
            utter.lang = 'en-US';
            utter.rate = 1;
            speechSynthesis.cancel();
            speechSynthesis.speak(utter);
        }
    }

    // Arrival check
    if (distTotal < 20) {
        showNotification("Arrival!");
        stopNavigation();
    }
}
		function getBearing(start, end) {
    const toRad = d => d * Math.PI / 180;

    const lat1 = toRad(start[0]);
    const lon1 = toRad(start[1]);
    const lat2 = toRad(end.lat);
    const lon2 = toRad(end.lng);

    const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
    const x =
        Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);

    let brng = Math.atan2(y, x) * 180 / Math.PI;
    return (brng + 360) % 360;
}

        async function searchLocation() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            setLoading(true);
            try {
                const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data.features?.length) {
                    const [lon, lat] = data.features[0].geometry.coordinates;
                    startNavigation([lat, lon]);
                } else {
                    showNotification("Place not found.");
                    setLoading(false);
                }
            } catch (e) { setLoading(false); }
        }

        function stopNavigation() {
    exitGuidanceLayout();

    if (routingControl) map.removeControl(routingControl);
    if (destMarker) map.removeLayer(destMarker);

    currentRoute = null;
    isNavigating = false;
    isGuidanceActive = false;

    document.getElementById('nav-hud').classList.add('hidden');
    document.getElementById('home-panel').classList.remove('hidden');

    if (userCoords) map.flyTo(userCoords, 16);
}

        function setLoading(isLoading) {
            const loader = document.getElementById('search-spinner');
            if (isLoading) { loader.classList.remove('hidden'); }
            else { loader.classList.add('hidden')}
            
        }

        function showNotification(text) {
            const el = document.getElementById('notification');
            el.innerText = text;
            el.classList.remove('opacity-0', '-translate-y-20');
            setTimeout(() => { if (el.innerText === text) el.classList.add('opacity-0', '-translate-y-20'); }, 3000);
        }

        function handleLocationError(err) { showNotification("GPS Error: " + err.message); }

        document.getElementById('search-btn').addEventListener('click', searchLocation);
        document.getElementById('search-input').addEventListener('keypress', (e) => e.key === 'Enter' && searchLocation());
        document.getElementById('recenter-btn').addEventListener('click', () => {
            if (userCoords) { map.flyTo(userCoords, 17); }
        });
        let touchStartX = 0;
let touchEndX = 0;
let currentInstrIdx = 0; // track which instruction is currently showing in preview

function showInstruction(idx) {
    if (!currentRoute) return;
    idx = Math.max(0, Math.min(idx, currentRoute.instructions.length - 1));
    currentInstrIdx = idx;
    const instr = currentRoute.instructions[idx];
    document.getElementById('next-instruction').innerText = instr.text || "Proceed to route";

    // Update maneuver icon
    const svg = document.getElementById('maneuver-svg');
    const lower = instr.text.toLowerCase();
    if (lower.includes('left')) svg.innerHTML = '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>';
    else if (lower.includes('right')) svg.innerHTML = '<path d="m12 5 7 7-7 7"/><path d="M5 12h14"/>';
	else if (lower.includes('circle') || lower.includes('roundabout')) {
    	if (lower.includes('enter')) svg.innerHTML = enterRoundaboutSVG;
    	else svg.innerHTML = exitRoundaboutSVG;
	}
    else svg.innerHTML = '<path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>';
}

// Touch events for swipe
const hudPanel = document.getElementById('hud-panel');
hudPanel.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
});
hudPanel.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleGesture();
});

function handleGesture() {
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) < 30) return; // ignore small moves

    if (diff < 0) {
        // swipe left → next instruction
        showInstruction(currentInstrIdx + 1);
    } else {
        // swipe right → previous instruction
        showInstruction(currentInstrIdx - 1);
    }
}
function speak(text) {
    if (!window.speechSynthesis) return; // Not supported
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 1; // speed (0.1-10)
    utterance.pitch = 1; // pitch (0-2)
    window.speechSynthesis.cancel(); // stop previous speech
    window.speechSynthesis.speak(utterance);
}
// ===== SAVED LOCATIONS SYSTEM =====
function getSavedLocations() {
    return JSON.parse(localStorage.getItem('savedLocations') || '[]');
}

function setSavedLocations(data) {
    localStorage.setItem('savedLocations', JSON.stringify(data));
}

function loadSavedLocations() {
    const container = document.getElementById('saved-locations-container');
    const saved = getSavedLocations();

    container.innerHTML = '';

    if (saved.length === 0) {
        container.innerHTML = `
            <div class="glass-panel rounded-2xl px-4 py-3 text-sm text-gray-500 shadow-lg">
                No saved locations yet
            </div>
        `;
        return;
    }

    saved.forEach((loc, idx) => {
        const card = document.createElement('div');
        card.className = `
            glass-panel rounded-2xl shadow-xm
            px-4 py-3 w-72
            flex items-center justify-between
            gap-3
            border border-white/40
        `;

        card.innerHTML = `
            <button class="flex-1 text-left overflow-hidden saved-nav-btn">
                <div class="font-bold text-gray-900 truncate">${loc.name}</div>
                <div class="text-xs text-gray-500 truncate">
                    ${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}
                </div>
            </button>

            <button class="delete-saved-btn p-2 rounded-xl bg-red-50 text-red-500 hover:bg-red-100 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M8 6V4h8v2"/>
                    <path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                </svg>
            </button>
        `;

        card.querySelector('.saved-nav-btn').onclick = () => {
            startNavigation([loc.lat, loc.lng]);
        };

        card.querySelector('.delete-saved-btn').onclick = () => {
            deleteSavedLocation(idx);
        };

        container.appendChild(card);
    });
}

function saveCurrentLocation() {
    if (!currentRoute) {
        showNotification("No destination to save.");
        return;
    }

    const name = prompt("Name this saved location:");
    if (!name?.trim()) return;

    const dest = currentRoute.coordinates[currentRoute.coordinates.length - 1];
    const saved = getSavedLocations();

    const duplicate = saved.find(loc =>
        Math.abs(loc.lat - dest.lat) < 0.0001 &&
        Math.abs(loc.lng - dest.lng) < 0.0001
    );

    if (duplicate) {
        showNotification("Location already saved.");
        return;
    }

    saved.push({
        name: name.trim(),
        lat: dest.lat,
        lng: dest.lng
    });

    setSavedLocations(saved);
    loadSavedLocations();
    showNotification("Saved successfully!");
}

function deleteSavedLocation(index) {
    const saved = getSavedLocations();

    saved.splice(index, 1);

    setSavedLocations(saved);
    loadSavedLocations();

    showNotification("Deleted saved location");
}
function goBackHome() {
    if (routingControl) map.removeControl(routingControl);
    if (destMarker) map.removeLayer(destMarker);

    currentRoute = null;
    isNavigating = false;
    isGuidanceActive = false;

    document.getElementById('nav-hud').classList.add('hidden');
    document.getElementById('home-panel').classList.remove('hidden');

    document.getElementById('search-input').value = '';

    if (userCoords) map.flyTo(userCoords, 16);
}
document.getElementById('save-location-btn')
    .addEventListener('click', saveCurrentLocation);

window.addEventListener('load', loadSavedLocations);
        window.onload = initMap;
    </script>
