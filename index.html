<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eMap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        #map { height: 100vh; width: 100%; z-index: 1; background: #f0f0f0; cursor: crosshair; }
        .leaflet-routing-container { display: none !important; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .user-location-marker {
            background: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            transition: all 0.5s linear;
        }
        .pulse-ring {
            border: 3px solid #3b82f6;
            border-radius: 50%;
            height: 40px;
            width: 40px;
            position: absolute;
            left: -12px;
            top: -12px;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .loading-spinner {
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Transitions for Guidance Mode */
        .hud-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .guidance-layout {
            max-width: 600px !important;
            border-radius: 24px !important;
            margin-left: 0 !important;
            margin-right: auto !important;
            transform: scale(0.95);
            border: 2px solid #3b82f6;
        }

        .custom-marker {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .instruction-highlight {
            font-size: 1.5rem;
            line-height: 1.2;
            color: #111827;
            font-weight: 800;
        }
        #hud-panel {
           max-width: 600px;
        }
    </style>
</head>

        let map, userMarker, routingControl, destMarker;
        let userCoords = null;
        let isNavigating = false;

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, tap: true }).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

            map.on('click', (e) => !isGuidanceActive && startNavigation([e.latlng.lat, e.latlng.lng]));

            if (navigator.permissions) {
                navigator.permissions.query({ name: 'geolocation' }).then(result => {
                    if (result.state === 'granted') requestLocationAccess();
                    else document.getElementById('location-prompt').classList.remove('hidden');
                });
            } else {
                document.getElementById('location-prompt').classList.remove('hidden');
            }
        }

        function requestLocationAccess() {
            followMode=true;
            document.getElementById('location-prompt').classList.add('opacity-0');
            setTimeout(() => document.getElementById('location-prompt').classList.add('hidden'), 500);
            watchId = navigator.geolocation.watchPosition(updateUserLocation, handleLocationError, {
                enableHighAccuracy: true, maximumAge: 0, timeout: 5000
            });
            followMode=false;
        }

function updateUserLocation(position) {
    const { latitude, longitude } = position.coords;
    userCoords = [latitude, longitude];

    if (!userMarker) {
        const userIcon = L.divIcon({
            className: 'user-location-wrapper',
            html: '<div class="pulse-ring"></div><div class="user-location-marker w-4 h-4"></div>',
            iconSize: [16, 16]
        });
        userMarker = L.marker(userCoords, { icon: userIcon }).addTo(map);
    } else {
        userMarker.setLatLng(userCoords);
    }

    // --- FOLLOW LOGIC ---
    if (followMode) {
        map.setView(userCoords, map.getZoom(), { animate: true }); // keep map following
    }

    // Update HUD/instructions even if not following
    if (isGuidanceActive && currentRoute) updateGuidanceUI();
}
        async function getRoadDetails(lat, lng) {
            try {
                const response = await fetch(`https://photon.komoot.io/reverse?lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data.features?.length) {
                    const p = data.features[0].properties;
                    return { 
                        name: p.name || p.street || "Unknown Road", 
                        address: [p.district, p.city].filter(Boolean).join(", ") 
                    };
                }
            } catch (e) {}
            return { name: "Target Point", address: "Route Established" };
        }

        async function snapToRoad(lat, lng) {
            try {
                const response = await fetch(`https://router.project-osrm.org/nearest/v1/driving/${lng},${lat}?number=1`);
                const data = await response.json();
                if (data.code === 'Ok' && data.waypoints.length) {
                    const [sLng, sLat] = data.waypoints[0].location;
                    return [sLat, sLng];
                }
            } catch (e) {}
            return [lat, lng];
        }
async function getNearbySuggestions() {
    if (!userCoords) return [];

    const [lat, lng] = userCoords;

    const jitter = () => (Math.random() - 0.5) * 0.01;

    const latJ = lat + jitter();
    const lngJ = lng + jitter();

    const query = `
[out:json][timeout:25];
(
  node["amenity"](around:1800,${latJ},${lngJ});
  node["shop"](around:1800,${latJ},${lngJ});
  node["tourism"](around:1800,${latJ},${lngJ});
  node["leisure"](around:1800,${latJ},${lngJ});
  node["healthcare"](around:1800,${latJ},${lngJ});
  node["office"](around:1800,${latJ},${lngJ});
);
out center 25;
`;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
    });

    const data = await res.json();

    let results = (data.elements || [])
        .filter(e => e.tags?.name && (e.lat || e.lon))
        .map(e => {
            const tags = e.tags || {};

            const type =
                tags.amenity ||
                tags.shop ||
                tags.tourism ||
                tags.leisure ||
                tags.healthcare ||
                tags.office ||
                "place";

            return {
                name: tags.name,
                type,
                lat: e.lat,
                lng: e.lon
            };
        });

    results = results
        .sort(() => Math.random() - 0.5);

    return results.slice(0, 12);
}
		function normalizePOIType(type) {
    const t = (type || "").toLowerCase();

    const map = {
        restaurant: "restaurant",
		bar: "bar",
		food_court: "food_court",
        fast_food: "fast_food",
        cafe: "cafe",
        school: "school",
        university: "school",
        hospital: "hospital",
        pharmacy: "hospital",
        clinic: "hospital",
        bank: "bank",
        atm: "bank",
        supermarket: "shop",
        convenience: "shop",
        clothes: "shop",
        mall: "shop",
        fuel: "fuel",
        parking: "parking",
        hotel: "hotel",
        hostel: "hotel",
        attraction: "tourism",
        museum: "tourism",
        zoo: "tourism",
		sports: "sports",
    };

    return map[t] || t;
}
		function getPOIIcon(type) {
    const t = normalizePOIType(type);

    if (t === "restaurant" || t === "fast_food" || t === "food_court")
        return "fa-utensils";
    if (t === "cafe")
        return "fa-mug-hot";
    if (t === "school")
        return "fa-school";
    if (t === "hospital")
        return "fa-hospital";
    if (t === "bank")
        return "fa-wallet";
    if (t === "shop")
        return "fa-cart-shopping";
    if (t === "fuel")
        return "fa-gas-pump";
    if (t === "hotel")
        return "fa-bed";
    if (t === "tourism")
        return "fa-camera";
	if (t === "bar")
        return "fa-wine-glass";
	if (t === "sports")
        return "fa-running";

    return "fa-building-columns";
}
		async function loadSuggestions() {
    const places = await getNearbySuggestions();
    if (!places.length) return;

    const top = places.slice(0, 3);

    const container = document.getElementById("saved-locations-container");
    if (!container) return;

    document.querySelectorAll(".suggestion-card").forEach(el => el.remove());

    top.forEach(p => {
        const icon = getPOIIcon(p.type);
        const typeLabel = normalizePOIType(p.type);

        const card = document.createElement("div");
        card.className = `
            suggestion-card glass-panel rounded-2xl px-4 py-3
            flex items-center justify-between gap-3
            cursor-pointer hover:bg-gray-100 transition mb-2
        `;

        card.innerHTML = `
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="text-blue-600 text-lg w-8 text-center">
                    <i class="fa-solid ${icon}"></i>
                </div>

                <div class="overflow-hidden">
                    <div class="font-bold text-gray-900 truncate">
                        ${p.name}
                    </div>
                    <div class="text-xs text-gray-500 capitalize">
                        ${typeLabel.replaceAll("_", " ")}
                    </div>
                </div>
            </div>

            <button class="text-xs font-bold text-blue-600">
                Go
            </button>
        `;

        card.onclick = () => {
            startNavigation([p.lat, p.lng]);
        };

        container.parentElement.insertBefore(card, container);
    });
}
		
        async function startNavigation(rawDest) {
            if (!userCoords) return showNotification("Locating...");
            setLoading(true);
            exitGuidanceLayout(); // Ensure standard layout for preview

            const [roadStart, roadDest, details] = await Promise.all([
                snapToRoad(userCoords[0], userCoords[1]),
                snapToRoad(rawDest[0], rawDest[1]),
                getRoadDetails(rawDest[0], rawDest[1])
            ]);
            document.getElementById('dest-name').innerText = details.name;
            document.getElementById('dest-address').innerText = details.address;

            if (routingControl) map.removeControl(routingControl);
            if (destMarker) map.removeLayer(destMarker);

            isNavigating = true;
            followMode = true;

            destMarker = L.marker(roadDest, { 
                icon: L.icon({ iconUrl: 'https://cdn0.iconfinder.com/data/icons/small-n-flat/24/678111-map-marker-512.png', iconSize: [44, 44], iconAnchor: [22, 44] })
            }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(roadStart[0], roadStart[1]), L.latLng(roadDest[0], roadDest[1])],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'driving' }),
                lineOptions: { styles: [{ color: '#1e3a8a', opacity: 0.1, weight: 12 }, { color: '#3b82f6', opacity: 0.9, weight: 6 }] },
                createMarker: () => null,
                show: false
            }).on('routesfound', (e) => {
                setLoading(false);
                currentRoute = e.routes[0];
                document.getElementById('home-panel').classList.add('hidden');
document.getElementById('nav-hud').classList.remove('hidden');
                
                const s = currentRoute.summary;
                document.getElementById('next-instruction').innerText = currentRoute.instructions[0]?.text || "Proceed to route";
                document.getElementById('distance-info').innerText = `${(s.totalDistance / 1000).toFixed(1)} km`;
                document.getElementById('duration-info').innerText = `${Math.round(s.totalTime / 60)}m`;
                
                const eta = new Date();
                eta.setSeconds(eta.getSeconds() + s.totalTime);
                document.getElementById('eta-time').innerText = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                
                document.getElementById('start-guidance-btn').onclick = enterGuidanceLayout;

                map.flyTo(roadStart, 17);
            }).addTo(map);
        }

        function enterGuidanceLayout() {
    followMode = true;
    isGuidanceActive = true;
    currentInstrIdx = 0; // start at first step
    showInstruction(currentInstrIdx); // show first instruction
    const hud = document.getElementById('nav-hud');
    const panel = document.getElementById('hud-panel');
    const search = document.getElementById('search-container');
    const mapCtrl = document.getElementById('map-controls');
    
    hud.classList.add('guidance-layout');
    panel.classList.add('bg-blue-50');
    search.classList.add('opacity-0', '-translate-y-20');
    mapCtrl.classList.add('translate-x-20');
    
    document.getElementById('mode-summary').classList.add('hidden');
    document.getElementById('action-buttons').classList.add('hidden');
    document.getElementById('close-nav-btn').classList.remove('hidden');
    
    map.setZoom(18);
    showNotification("Guidance Started");
}
        function exitGuidanceLayout() {
            followMode = false;
            isGuidanceActive = false;
            const hud = document.getElementById('nav-hud');
            const panel = document.getElementById('hud-panel');
            const search = document.getElementById('search-container');
            const mapCtrl = document.getElementById('map-controls');
            
            hud.classList.remove('guidance-layout');
            panel.classList.remove('bg-blue-50', 'guidance-active');
            search.classList.remove('opacity-0', '-translate-y-20');
            mapCtrl.classList.remove('translate-x-20');
            
            document.getElementById('mode-summary').classList.remove('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');
        }
let lastInstructionIdx = 0;
        function updateGuidanceUI() {
    if (!currentRoute || !userCoords) return;

    const instructions = currentRoute.instructions;

    let closestIdx = lastInstructionIdx;
    let minDistance = Infinity;

    for (let i = lastInstructionIdx; i < instructions.length; i++) {
        const instr = instructions[i];
        const point = currentRoute.coordinates[instr.index];

        const d = L.latLng(userCoords)
            .distanceTo(L.latLng(point.lat, point.lng));

        if (d < minDistance) {
            minDistance = d;
            closestIdx = i;
        }
    }
    if (closestIdx > lastInstructionIdx && minDistance < 40) {
        lastInstructionIdx = closestIdx;
    }

    const instr = instructions[lastInstructionIdx];
    let nextText = instr.text || "Proceed";

    document.getElementById('next-instruction').innerText = nextText;

    const svg = document.getElementById('maneuver-svg');
    const lower = instr.text.toLowerCase();
			
if (lower.includes('roundabout') || lower.includes('circle')) {
    svg.innerHTML = lower.includes('enter') ? enterRoundaboutSVG : exitRoundaboutSVG;
}
else if (lower.includes('slight left') || lower.includes('keep left')) {
    svg.innerHTML = slightLeftSVG;
}
else if (lower.includes('slight right') || lower.includes('keep right')) {
    svg.innerHTML = slightRightSVG;
}
else if (lower.includes('merge')) {
    svg.innerHTML = mergeSVG;
}
else if (lower.includes('left')) {
    svg.innerHTML = '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>';
}
else if (lower.includes('right')) {
    svg.innerHTML = '<path d="m12 5 7 7-7 7"/><path d="M5 12h14"/>';
}
else {
    svg.innerHTML = '<path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>';
}

    document.getElementById('distance-info').innerText =
        minDistance < 40 ? "NOW" : `${Math.round(minDistance)}m`;

    const dest = currentRoute.coordinates[currentRoute.coordinates.length - 1];
    const distTotal = L.latLng(userCoords).distanceTo(L.latLng(dest.lat, dest.lng));

    if (distTotal < 20) {
        showNotification("Arrival!");
        stopNavigation();
    }
	drawRouteProgress(lastInstructionIdx)
}
function drawRouteProgress(idx) {
    if (!currentRoute) return;

    const coords = currentRoute.coordinates;

    if (traveledLine) map.removeLayer(traveledLine);
    if (remainingLine) map.removeLayer(remainingLine);

    const traveled = coords.slice(0, idx + 1).map(p => [p.lat, p.lng]);
    const remaining = coords.slice(idx).map(p => [p.lat, p.lng]);

    traveledLine = L.polyline(traveled, {
        color: "#9ca3af",
        weight: 6,
        opacity: 0.9
    }).addTo(map);

    remainingLine = L.polyline(remaining, {
        color: "#3b82f6",
        weight: 6,
        opacity: 1
    }).addTo(map);
}
        async function searchLocation() {
    const query = document.getElementById('search-input').value;
    if (!query) return;

    setLoading(true);

    try {
		const photonRes = await fetch(
    		`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lat=${userCoords?.[0] || 0}&lon=${userCoords?.[1] || 0}`
		);
        const photonData = await photonRes.json();

        const nomRes = await fetch(
    		`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&viewbox=${userCoords?.[1]-0.5},${userCoords?.[0]+0.5},${userCoords?.[1]+0.5},${userCoords?.[0]-0.5}&bounded=1`
		);
        const nomData = await nomRes.json();

        setLoading(false);

        const results = [];

        if (photonData.features) {
            photonData.features.forEach(f => {
                results.push({
                    name: f.properties.name || f.properties.street || f.properties.city || "Unknown",
                    subtitle: [f.properties.city, f.properties.country].filter(Boolean).join(", "),
                    lat: f.geometry.coordinates[1],
                    lng: f.geometry.coordinates[0]
                });
            });
        }

        nomData.forEach(n => {
            results.push({
                name: n.display_name.split(",")[0],
                subtitle: n.display_name,
                lat: parseFloat(n.lat),
                lng: parseFloat(n.lon)
            });
        });

        if (!results.length) {
            showNotification("No results found");
            return;
        }
		results.forEach(r => {
    if (userCoords) {
        r.distance = getDistanceMeters(userCoords[0], userCoords[1], r.lat, r.lng);
    } else {
        r.distance = Infinity;
    }
});

results.sort((a, b) => a.distance - b.distance);

        showSearchResults(results);

    } catch (e) {
        setLoading(false);
        showNotification("Search error");
    }
}
function showSearchResults(results) {
    let existing = document.getElementById("search-results");
    if (existing) existing.remove();

    const formatDistance = (m) => {
        if (m === Infinity) return "";
        return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(1)} km`;
    };

    const box = document.createElement("div");
    box.id = "search-results";
    box.className =
        "absolute bottom-40 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden z-[2000]";

    box.innerHTML = results.map(r => `
        <div class="p-3 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center"
            onclick="selectPlace(${r.lat}, ${r.lng})">

            <div class="overflow-hidden pr-2">
                <div class="font-bold text-gray-900 truncate">
                    ${r.name}
                </div>
                <div class="text-xs text-gray-500 truncate">
                    ${r.subtitle || ""}
                </div>
            </div>

            <div class="text-xs font-bold text-blue-600 shrink-0">
                ${formatDistance(r.distance)}
            </div>

        </div>
    `).join("");

    document.body.appendChild(box);
}
		function selectPlace(lat, lng) {
    const box = document.getElementById("search-results");
    if (box) box.remove();

    startNavigation([lat, lng]);
}
		function getDistanceMeters(aLat, aLng, bLat, bLng) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(bLat - aLat);
    const dLng = toRad(bLng - aLng);

    const A =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(aLat)) *
        Math.cos(toRad(bLat)) *
        Math.sin(dLng / 2) ** 2;

    return R * 2 * Math.atan2(Math.sqrt(A), Math.sqrt(1 - A));
}

// Touch events for swipe
const hudPanel = document.getElementById('hud-panel');
hudPanel.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
});
hudPanel.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleGesture();
});

function handleGesture() {
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) < 30) return; // ignore small moves

    if (diff < 0) {
        // swipe left → next instruction
        showInstruction(currentInstrIdx + 1);
    } else {
        // swipe right → previous instruction
        showInstruction(currentInstrIdx - 1);
    }
}
function speak(text) {
    if (!window.speechSynthesis) return; // Not supported
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 1; // speed (0.1-10)
    utterance.pitch = 1; // pitch (0-2)
    window.speechSynthesis.cancel(); // stop previous speech
    window.speechSynthesis.speak(utterance);
}
// ===== SAVED LOCATIONS SYSTEM =====
function getSavedLocations() {
    return JSON.parse(localStorage.getItem('savedLocations') || '[]');
}

function setSavedLocations(data) {
    localStorage.setItem('savedLocations', JSON.stringify(data));
}

function loadSavedLocations() {
    const container = document.getElementById('saved-locations-container');
    const saved = getSavedLocations();

    container.innerHTML = '';

    if (saved.length === 0) {
        container.innerHTML = `
            <div class="glass-panel rounded-2xl px-4 py-3 text-sm text-gray-500 shadow-lg">
                No saved locations yet
            </div>
        `;
        return;
    }

    saved.forEach((loc, idx) => {
        const card = document.createElement('div');
        card.className = `
            glass-panel rounded-2xl shadow-xm
            px-4 py-3 w-72
            flex items-center justify-between
            gap-3
            border border-white/40
        `;

        card.innerHTML = `
            <button class="flex-1 text-left overflow-hidden saved-nav-btn">
                <div class="font-bold text-gray-900 truncate">${loc.name}</div>
                <div class="text-xs text-gray-500 truncate">
                    ${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}
                </div>
            </button>

            <button class="delete-saved-btn p-2 rounded-xl bg-red-50 text-red-500 hover:bg-red-100 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M8 6V4h8v2"/>
                    <path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                </svg>
            </button>
        `;

        card.querySelector('.saved-nav-btn').onclick = () => {
            startNavigation([loc.lat, loc.lng]);
        };

        card.querySelector('.delete-saved-btn').onclick = () => {
            deleteSavedLocation(idx);
        };

        container.appendChild(card);
    });
}

function saveCurrentLocation() {
    if (!currentRoute) {
        showNotification("No destination to save.");
        return;
    }

    const name = prompt("Name this saved location:");
    if (!name?.trim()) return;

    const dest = currentRoute.coordinates[currentRoute.coordinates.length - 1];
    const saved = getSavedLocations();

    const duplicate = saved.find(loc =>
        Math.abs(loc.lat - dest.lat) < 0.0001 &&
        Math.abs(loc.lng - dest.lng) < 0.0001
    );

    if (duplicate) {
        showNotification("Location already saved.");
        return;
    }

    saved.push({
        name: name.trim(),
        lat: dest.lat,
        lng: dest.lng
    });

    setSavedLocations(saved);
    loadSavedLocations();
    showNotification("Saved successfully!");
}

function deleteSavedLocation(index) {
    const saved = getSavedLocations();

    saved.splice(index, 1);

    setSavedLocations(saved);
    loadSavedLocations();

    showNotification("Deleted saved location");
}
